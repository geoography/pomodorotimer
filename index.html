<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    div id="longBreakBanner" class="banner hidden">
    <span>🔥 4 sesi fokus selesai! Mau lanjut ke Long Break?</span>

    <div class="banner-buttons">
        <button id="yesLongBreak">Ya</button>
        <button id="noLongBreak">Tidak</button>
    </div>
</div>
    <div class="container">
        <h1>Pomodoro Timer🦀</h1>
        <div id="input">
            Focus(min):<input type="number" id="focus_duration" value=25 min="1" max="60"> ||
            Short break(min):<input type="number" id="short_duration" value=25 min="1" max="15"> ||
            Longbreak(min):<input type="number" id="long_duration" value=25 min="1" max="25">
        </div>
        <div id="timer">25:00</div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="continue">Continue</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
        <div id=status>
            Siap-siap dulu yaa‼️</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
